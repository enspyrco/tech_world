name: Sync Firebase Rules

# Keep the Firestore/Storage security rules + indexes in the repo as the single
# source of truth, and DEPLOY them on every merge to main that touches them — so
# "deployed == repo" holds by construction instead of by hand. The web bundle is
# deployed separately by deploy.yml (rsync to OCI); this workflow only touches
# Firebase config, and only when the rules/index files actually change.
#
# Why a separate workflow with a paths filter: a rules-only change must not
# trigger a full web rebuild, and a web-only change must not redeploy rules.
#
# SAFETY: `firebase deploy` compiles the rules server-side and rejects an
# invalid ruleset, failing this job WITHOUT replacing the live rules (deploys
# are atomic per service). So a broken rules file merged to main turns CI red
# and leaves the previous good rules in place, rather than pushing a bad gate.
# (Pre-merge validation via the rules emulator is a worthwhile follow-up.)

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - storage.rules
      - firestore.indexes.json
      - firebase.json
  # Allow a manual re-sync from the Actions tab (e.g. after a hand-edit in the
  # console drifted prod away from the repo, to slam it back to source-of-truth).
  workflow_dispatch:

# Serialize rule deploys so two quick merges can't race the same ruleset.
concurrency:
  group: deploy-firebase-rules
  cancel-in-progress: false

jobs:
  sync-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Write service-account credentials
        # GitHub masks registered secrets in logs; printf (not echo) keeps the
        # JSON intact. The file lives in RUNNER_TEMP, wiped when the job ends.
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set — cannot deploy rules."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore + Storage rules and indexes
        # --only scopes the deploy to rules+indexes; it never touches hosting,
        # functions, or data. firebase-tools picks up the service account from
        # GOOGLE_APPLICATION_CREDENTIALS.
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project adventures-in-tech-world-0 \
            --non-interactive \
            --force

      - name: Scrub credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
