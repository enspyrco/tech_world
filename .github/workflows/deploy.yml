name: Test and Deploy
on:
  push:
    branches:
      - main
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      skip_tests: ${{ steps.filter.outputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if docs-only change
        id: filter
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if all changes are docs (md, txt, LICENSE, etc.)
          DOCS_ONLY="true"
          while IFS= read -r file; do
            if [[ -n "$file" && ! "$file" =~ \.(md|txt|MD|TXT)$ && "$file" != "LICENSE" && "$file" != "CHANGELOG" ]]; then
              DOCS_ONLY="false"
              break
            fi
          done <<< "$CHANGED_FILES"

          # Check for [skip-tests] in commit message
          SKIP_TESTS="false"
          COMMIT_MSG=$(git log --format=%B -n 1 HEAD)
          if [[ "$COMMIT_MSG" == *"[skip-tests]"* ]]; then
            SKIP_TESTS="true"
          fi

          echo "docs_only=$DOCS_ONLY" >> $GITHUB_OUTPUT
          echo "skip_tests=$SKIP_TESTS" >> $GITHUB_OUTPUT
          echo "Docs only: $DOCS_ONLY"
          echo "Skip tests: $SKIP_TESTS"

  test:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze code
        run: flutter analyze --fatal-infos
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Remove untestable files from coverage
        run: |
          lcov --ignore-errors unused --remove coverage/lcov.info \
            '*/native/video_frame_ffi.dart' \
            '*/native/video_frame_web_stub.dart' \
            '*/native/video_frame_web_v2_stub.dart' \
            '*/flame/components/video_bubble_component.dart' \
            '*/auth/auth_service.dart' \
            '*/flame/tiles/predefined_tilesets.dart' \
            -o coverage/lcov.info
      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 45

  build_and_deploy:
    needs: [changes, test]
    # Skip build for docs-only changes. Run when tests pass OR tests were skipped.
    if: |
      always() &&
      needs.changes.outputs.docs_only != 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - run: flutter build web --wasm --pwa-strategy=none --dart-define="DREAMFINDER_API_KEY=$DREAMFINDER_API_KEY"
        env:
          DREAMFINDER_API_KEY: ${{ secrets.DREAMFINDER_API_KEY }}
      - name: Deploy to world.imagineering.cc
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H 149.118.69.221 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete -e "ssh -i ~/.ssh/oci_key" build/web/ nick@149.118.69.221:/srv/tech-world/
          rm -f ~/.ssh/oci_key
