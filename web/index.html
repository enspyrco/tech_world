<!doctype html>
<html>
    <head>
        <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
        <base href="$FLUTTER_BASE_HREF" />

        <meta charset="UTF-8" />
        <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
        <meta
            name="description"
            content="Tech World - Multiplayer virtual world game"
        />

        <!-- Canonical URL: world.imagineering.cc is the only supported host.
             Any other host (e.g. *.web.app, *.firebaseapp.com,
             adventures-in-tech.world) that has historically served this app
             is being decommissioned — see
             docs/deploy/url-consolidation-runbook.md. -->
        <link rel="canonical" href="https://world.imagineering.cc/" />

        <!-- Open Graph / social cards -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Tech World" />
        <meta property="og:title" content="Tech World" />
        <meta
            property="og:description"
            content="A multiplayer coding adventure where real programming is the gameplay."
        />
        <meta property="og:url" content="https://world.imagineering.cc/" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Tech World" />
        <meta
            name="twitter:description"
            content="A multiplayer coding adventure where real programming is the gameplay."
        />

        <!-- Google Sign-In (Identity Services) -->
        <meta name="google-signin-client_id" content="614230417388-k5gk56q0ssmj880egv1b1blq5nag3rs1.apps.googleusercontent.com">
        <script src="https://accounts.google.com/gsi/client" async defer></script>

        <!-- iOS meta tags & icons -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="Tech World" />
        <link rel="apple-touch-icon" href="icons/Icon-192.png" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="favicon.png" />

        <title>Tech World</title>
        <link rel="manifest" href="manifest.json" />

        <style>
            body {
                margin: 0;
                background-color: #1a1a2e;
            }
            .loading-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background-color: #1a1a2e;
                z-index: 9999;
                transition: opacity 0.3s ease-out;
            }
            .loading-container.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .loading-logo {
                font-size: 32px;
                font-weight: bold;
                color: #fff;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                margin-bottom: 30px;
            }
            .progress-container {
                width: 200px;
                height: 4px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 2px;
                overflow: hidden;
            }
            .progress-bar {
                height: 100%;
                background: #4ade80;
                border-radius: 2px;
                width: 0%;
                transition: width 0.3s ease-out;
            }
            .progress-bar.indeterminate {
                width: 30%;
                animation: indeterminate 1.5s ease-in-out infinite;
            }
            .loading-text {
                margin-top: 16px;
                color: #888;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 13px;
            }
            @keyframes indeterminate {
                0% {
                    transform: translateX(-100%);
                }
                100% {
                    transform: translateX(400%);
                }
            }
        </style>
    </head>
    <body>
        <div id="loading" class="loading-container">
            <div class="loading-logo">Tech World</div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar indeterminate"></div>
            </div>
            <div id="loading-text" class="loading-text">Loading...</div>
        </div>

        <script>
            // Bypass Flutter's keyboard interception for browser reload
            // shortcuts. Flutter web's engine calls preventDefault on the
            // Flame canvas keyboard events, which swallows Cmd+R /
            // Cmd+Shift+R (hard refresh) and F5. Without this, users can't
            // refresh from the page, and "hard refresh" advice (e.g. when we
            // ship a new bundle) becomes impossible to follow.
            //
            // We register at the CAPTURE phase so we run before Flutter's
            // bubble-phase listener, then stopImmediatePropagation to
            // prevent Flutter from ever seeing the event. Browser native
            // reload then fires because nobody calls preventDefault.
            window.addEventListener(
                "keydown",
                function (e) {
                    var k = e.key;
                    var mod = e.metaKey || e.ctrlKey;
                    // F5: always a reload.
                    // Cmd/Ctrl + R: reload (Cmd/Ctrl + Shift + R = hard reload).
                    if (k === "F5" || (mod && (k === "r" || k === "R"))) {
                        e.stopImmediatePropagation();
                    }
                },
                true
            );

            // ── WebGL context-loss recovery ──────────────────────────
            // Flutter's CanvasKit renderer draws the ENTIRE game (map,
            // avatars, video bubbles) through a single WebGL context. If
            // the browser drops that context — seen in Firefox under GPU
            // memory pressure from the per-frame video-bubble texture
            // churn — CanvasKit cannot rebuild its GrContext (it falls
            // back to CPU, which then also throws "index out of bounds"),
            // leaving the canvas permanently frozen while LiveKit audio
            // (a separate pipeline) keeps playing. That "video froze but
            // audio is fine" symptom is the fingerprint.
            //
            // Flutter 3.44 has no in-place recovery, so we detect the loss
            // and auto-reload: a fresh page gets a fresh context (exactly
            // what a manual Cmd+R does, but automatic). The overlay is
            // plain DOM — NOT Flutter — so it paints even while WebGL is
            // dead. A reload-loop guard (sessionStorage) stops a
            // fundamentally unhappy GPU from bricking the session in a
            // reload storm: after repeated failures we show a manual
            // recovery prompt instead.
            (function () {
                var RECOVERY_KEY = "glRecovery";
                var LOOP_WINDOW_MS = 60000; // resets the failure counter
                var MAX_AUTO_RELOADS = 2; // before falling back to manual
                var reloading = false;

                function readState() {
                    try {
                        return JSON.parse(
                            sessionStorage.getItem(RECOVERY_KEY) || "{}"
                        );
                    } catch (_) {
                        return {};
                    }
                }
                function writeState(s) {
                    try {
                        sessionStorage.setItem(
                            RECOVERY_KEY,
                            JSON.stringify(s)
                        );
                    } catch (_) {}
                }

                function overlay(title, detail, buttonLabel) {
                    if (document.getElementById("gl-recovery")) return;
                    var o = document.createElement("div");
                    o.id = "gl-recovery";
                    o.style.cssText =
                        "position:fixed;inset:0;z-index:10000;display:flex;" +
                        "flex-direction:column;justify-content:center;" +
                        "align-items:center;background:#1a1a2e;color:#fff;" +
                        "text-align:center;padding:24px;font-family:" +
                        "-apple-system,BlinkMacSystemFont,'Segoe UI'," +
                        "Roboto,sans-serif;";
                    var t = document.createElement("div");
                    t.style.cssText =
                        "font-size:24px;font-weight:bold;margin-bottom:12px;";
                    t.textContent = title;
                    var d = document.createElement("div");
                    d.style.cssText =
                        "color:#888;font-size:13px;max-width:360px;";
                    d.textContent = detail;
                    o.appendChild(t);
                    o.appendChild(d);
                    if (buttonLabel) {
                        var b = document.createElement("button");
                        b.textContent = buttonLabel;
                        b.style.cssText =
                            "margin-top:20px;padding:10px 20px;border:none;" +
                            "border-radius:6px;background:#4ade80;" +
                            "color:#1a1a2e;font-weight:bold;font-size:14px;" +
                            "cursor:pointer;";
                        b.onclick = function () {
                            writeState({}); // clear the loop guard
                            window.location.reload();
                        };
                        o.appendChild(b);
                    }
                    document.body.appendChild(o);
                }

                function onContextLost(e) {
                    // preventDefault permits the browser to attempt
                    // restoration and marks the event handled. We reload
                    // regardless because Flutter can't rebuild its render
                    // resources in place.
                    if (e && e.preventDefault) e.preventDefault();
                    if (reloading) return;
                    reloading = true;

                    var now = Date.now();
                    var st = readState();
                    if (!st.ts || now - st.ts > LOOP_WINDOW_MS) st.count = 0;
                    st.count = (st.count || 0) + 1;
                    st.ts = now;
                    writeState(st);

                    if (st.count > MAX_AUTO_RELOADS) {
                        console.error(
                            "[gl-recovery] WebGL context lost " +
                                st.count +
                                "x in " +
                                LOOP_WINDOW_MS / 1000 +
                                "s — stopping auto-reload, asking the user."
                        );
                        overlay(
                            "Display can't recover",
                            "The graphics context keeps failing — your GPU " +
                                "may be under pressure. Try closing other " +
                                "tabs or apps, then reload. Your audio is " +
                                "unaffected.",
                            "Reload page"
                        );
                        return;
                    }

                    console.error(
                        "[gl-recovery] WebGL context lost — auto-reloading " +
                            "to recover (audio pipeline unaffected)."
                    );
                    overlay(
                        "Restoring display…",
                        "The graphics context was lost. Reconnecting — your " +
                            "audio is unaffected."
                    );
                    // Brief delay so the overlay paints before the reload.
                    setTimeout(function () {
                        window.location.reload();
                    }, 1500);
                }

                // webglcontextlost does not bubble, but capture-phase
                // listeners on window still receive it (capture descends
                // root->target for ALL events). Same trick as the keydown
                // bypass above.
                window.addEventListener(
                    "webglcontextlost",
                    onContextLost,
                    true
                );
                // Surface creation failures for diagnostics — these
                // accompany the "failed to create GrContext" error seen in
                // Firefox when CanvasKit tries to re-create a dead context.
                window.addEventListener(
                    "webglcontextcreationerror",
                    function (ev) {
                        console.error(
                            "[gl-recovery] WebGL context creation error: " +
                                ((ev && ev.statusMessage) || "(no detail)")
                        );
                    },
                    true
                );
            })();

            // Loading progress management
            var progressBar = null;
            var loadingText = null;

            function setProgress(percent, text) {
                if (!progressBar)
                    progressBar = document.getElementById("progress-bar");
                if (!loadingText)
                    loadingText = document.getElementById("loading-text");

                if (progressBar) {
                    progressBar.classList.remove("indeterminate");
                    progressBar.style.width = percent + "%";
                }
                if (loadingText && text) {
                    loadingText.textContent = text;
                }
            }

            function hideLoading() {
                setProgress(100, "Ready!");
                setTimeout(function () {
                    var loading = document.getElementById("loading");
                    if (loading) {
                        loading.classList.add("hidden");
                        setTimeout(function () {
                            loading.remove();
                        }, 300);
                    }
                }, 200);
            }

            // Track loading stages
            setProgress(10, "Initializing...");

            // Watch for Flutter initialization
            window.addEventListener("load", function () {
                setProgress(30, "Loading Flutter engine...");

                var checkInterval = setInterval(function () {
                    var glassPane = document.querySelector("flt-glass-pane");
                    if (glassPane) {
                        clearInterval(checkInterval);
                        // App mounted — if we got here via a context-loss
                        // auto-reload, that recovery worked, so clear the
                        // reload-loop guard for a clean slate.
                        try {
                            sessionStorage.removeItem("glRecovery");
                        } catch (_) {}
                        setProgress(80, "Starting game...");

                        // Give app time to render first frame
                        setTimeout(hideLoading, 500);
                    }
                }, 100);

                // Fallback: hide loading after 10 seconds max
                setTimeout(function () {
                    clearInterval(checkInterval);
                    hideLoading();
                }, 10000);
            });
        </script>

        <!--
            The ?v=BUILD_SHA query string is rewritten by the deploy workflow
            (.github/workflows/deploy.yml) to the commit SHA. Combined with the
            no-cache header on /flutter_bootstrap.js in Caddy, this guarantees
            browsers fetch the freshly-deployed bundle instead of serving a
            stale cached main.dart.js. See docs/deploy/cache-busting.md.
        -->
        <script src="flutter_bootstrap.js?v=BUILD_SHA" async></script>
    </body>
</html>
